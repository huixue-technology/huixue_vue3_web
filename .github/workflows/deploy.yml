name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 101.200.240.100 >> ~/.ssh/known_hosts

      - name: Deploy to servers
        run: |
          rsync -avz --delete dist/ root@101.200.240.100:/opt/huixue_frontend/
          rsync -avz --delete dist/ root@101.200.240.100:/opt/huixue_frontend_sangao/
